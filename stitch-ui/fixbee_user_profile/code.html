<script>
        // Simple touch interaction for menu items
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', function() {
                this.classList.add('opacity-80');
            });
            button.addEventListener('touchend', function() {
                this.classList.remove('opacity-80');
            });
        });

        // Background subtle pulse animation for premium card
        const glow = document.querySelector('.premium-glow');
        if (glow) {
            let hue = 45; // Primary yellow hue
            setInterval(() => {
                hue = (hue + 1) % 360;
                // Subtle hue shift if needed, currently keeping it stable for premium feel
            }, 100);
        }
    </script>
