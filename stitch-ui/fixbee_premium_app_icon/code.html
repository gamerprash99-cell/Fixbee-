<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Premium Bee App Icon</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="layout">
    /* Ensure the icon is perfectly centered and maintains a 1:1 aspect ratio */
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #1a1a1a;
    }
    .icon-container {
      width: 1024px;
      height: 1024px;
      position: relative;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
<!-- BEGIN: AppIconContainer -->
<div class="icon-container" data-purpose="app-icon-main">
<!-- BEGIN: IconBackground -->
<!-- Deep charcoal background with rounded corners and metallic border -->
<div class="w-full h-full rounded-[220px] bg-[#0B0D10] border-[12px] border-[#9A5A24] shadow-2xl flex items-center justify-center relative" data-purpose="icon-background">
<!-- BEGIN: BeeLogoSVG -->
<!-- High-fidelity inline SVG logo based on the visual reference -->
<svg data-purpose="bee-logo" fill="none" height="800" viewbox="0 0 1024 1024" width="800" xmlns="http://www.w3.org/2000/svg">
<!-- BEGIN: BeeBody -->
<!-- Main structure of the bee including the tail and torso -->
<path d="M720 480C720 480 650 600 500 650C430 673 380 750 380 780C380 780 430 730 460 700C500 660 550 550 550 550L720 480Z" fill="#9A5A24"></path>
<!-- END: BeeBody -->
<!-- BEGIN: BeeStripes -->
<!-- Rust-orange decorative stripes on the body -->
<path d="M480 570C510 590 540 620 520 660C500 655 460 625 450 610L480 570Z" fill="#C85A2A"></path>
<path d="M530 525C570 545 610 585 580 635C550 625 500 580 490 560L530 525Z" fill="#C85A2A"></path>
<!-- END: BeeStripes -->
<!-- BEGIN: BeeWing -->
<!-- Large elegant wing with cream/gold fill and sharp stylized points -->
<path d="M220 440C150 490 180 580 230 630C280 680 380 600 380 600L700 450C700 450 400 320 220 440Z" fill="#9A5A24"></path>
<path d="M250 460C200 500 230 560 260 590C300 630 380 560 380 560L680 440C680 440 400 340 250 460Z" fill="#F1D3A6"></path>
<!-- Inner wing detail/cutout -->
<path d="M350 450L600 430C600 430 400 370 350 450Z" fill="#0B0D10"></path>
<!-- END: BeeWing -->
<!-- BEGIN: BeeHead -->
<!-- Simple oval head facing right -->
<ellipse cx="780" cy="440" fill="#9A5A24" rx="70" ry="90" transform="rotate(-30 780 440)"></ellipse>
<!-- Head detail/Eye shape -->
<ellipse cx="795" cy="450" fill="#0B0D10" rx="30" ry="45" transform="rotate(-30 795 450)"></ellipse>
<!-- END: BeeHead -->
<!-- BEGIN: BeeAntenna -->
<!-- Minimal stylized antennae -->
<path d="M820 380C850 340 900 340 940 360" stroke="#F1D3A6" stroke-linecap="round" stroke-width="12"></path>
<path d="M850 410C880 390 920 400 950 430" stroke="#F1D3A6" stroke-linecap="round" stroke-width="12"></path>
<!-- END: BeeAntenna -->
<!-- BEGIN: BeeStinger -->
<!-- Sharp stinger integrated into the lower tail -->
<path d="M380 780L350 850L410 750" fill="#9A5A24"></path>
<!-- END: BeeStinger -->
</svg>
<!-- END: BeeLogoSVG -->
</div>
<!-- END: IconBackground -->
</div>
<!-- END: AppIconContainer -->
</body></html>
