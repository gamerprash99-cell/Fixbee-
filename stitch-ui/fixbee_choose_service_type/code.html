<script>
        function selectService(type) {
            const doorstep = document.getElementById('card-doorstep');
            const mailin = document.getElementById('card-mailin');
            const continueBtn = document.getElementById('continue-btn');

            // Reset
            doorstep.classList.remove('service-card-selected');
            mailin.classList.remove('service-card-selected');
            
            // Apply Selection
            if(type === 'doorstep') {
                doorstep.classList.add('service-card-selected');
            } else {
                mailin.classList.add('service-card-selected');
            }

            // Enable Continue
            continueBtn.disabled = false;
            continueBtn.classList.remove('bg-primary-container/30', 'text-on-surface-variant/40', 'cursor-not-allowed');
            continueBtn.classList.add('bg-primary-container', 'text-on-primary-container', 'hover:opacity-90', 'active:scale-[0.98]');
            continueBtn.innerHTML = 'Continue to Schedule';
        }

        // Entrance animation
        window.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.glass-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.5s cubic-bezier(0.16, 1, 0.3, 1)';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, 100 * index);
            });
        });
    </script>
