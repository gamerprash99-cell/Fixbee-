<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

      theme: {
        extend: {
          "colors": {
            "on-secondary-container": "#002d61",
            "surface-variant": "#d3e4fe",
            "on-surface-variant": "#4d4732",
            "secondary": "#005cba",
            "on-surface": "#0b1c30",
            "on-tertiary-container": "#575e75",
            "inverse-primary": "#e9c400",
            "background": "#f8f9ff",
            "tertiary": "#565e74",
            "on-secondary-fixed-variant": "#00458e",
            "surface-tint": "#705d00",
            "primary-fixed-dim": "#e9c400",
            "on-error": "#ffffff",
            "surface-bright": "#f8f9ff",

            "on-primary-fixed": "#221b00",
            "tertiary-fixed": "#dae2fd",
            "surface": "#f8f9ff",
            "on-primary-fixed-variant": "#544600",
            "error": "#ba1a1a",
            "surface-container": "#e5eeff",
            "on-primary-container": "#705e00",
            "secondary-fixed": "#d7e3ff",
            "surface-container-low": "#eff4ff",
            "on-background": "#0b1c30",
            "inverse-surface": "#213145",
            "inverse-on-surface": "#eaf1ff",
            "on-tertiary-fixed-variant": "#3f465c",
            "on-tertiary-fixed": "#131b2e",
            "tertiary-fixed-dim": "#bec6e0",
            "surface-container-high": "#dce9ff",
            "outline": "#7e775f",
            "surface-container-highest": "#d3e4fe",
            "on-primary": "#ffffff",
            "surface-dim": "#cbdbf5",
            "primary-container": "#ffd700",
            "secondary-container": "#5095fe",
            "primary": "#705d00",
            "on-tertiary": "#ffffff",
            "surface-container-lowest": "#ffffff",
            "on-secondary-fixed": "#001b3e",
            "error-container": "#ffdad6",
            "outline-variant": "#d0c6ab",
            "on-secondary": "#ffffff",
            "on-error-container": "#93000a",

          "borderRadius": {

          "spacing": {

          "fontFamily": {

      },

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    
    @keyframes scanline {
      0% { transform: translateY(-100%); opacity: 0; }
      50% { opacity: 1; }
      100% { transform: translateY(300px); opacity: 0; }
    }
    .animate-scan {
      animation: scanline 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    
    .glass-panel {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(20px);
      border: 0.5px solid rgba(255, 255, 255, 0.3);
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg antialiased overflow-hidden h-screen flex flex-col">
<!-- TopAppBar Execution -->
<header class="bg-surface dark:bg-surface-dim w-full sticky top-0 z-50 flex items-center justify-between px-margin-mobile h-16 w-full">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface">Shipment Scanning</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-100" id="flashlight-toggle">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">flashlight_on</span>
</button>
<button class="p-2 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined text-primary dark:text-primary-fixed-dim">settings</span>
</button>
</div>
</header>
<main class="flex-1 relative overflow-hidden flex flex-col bg-black">
<!-- Camera Viewfinder -->
<div class="absolute inset-0 z-0">
<img alt="Inventory Warehouse Viewfinder" class="w-full h-full object-cover opacity-60" data-alt="A cinematic, low-angle shot of a high-tech warehouse shelf filled with neatly organized electronics components. The scene is viewed through a camera lens with technical overlays, featuring high-contrast indigo and bright yellow industrial accents. Warm amber lighting illuminates the textured metallic surfaces, creating a professional and efficient atmosphere for logistics and device care." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD33CFHqyrVEiWK5P_KGBm8VkFse0rQYIjbuxZRwteilXX4M3996VKdCBKX2dBjUeCdEuVFzYyLUpS918Ad31WB7YIRH7X82IuXF4ox-0eAx2N7Un4gXX5sn8Um31Hl_MAtpabnvmo6gKb0i_29Bwa97zSxnZVRHXAfkZzKs0ZZoySNaXhDSHVy4rEHTSMXKQfjPSSlMD4dXXqYIgtvfIdR5oPHH9fCrtdCYMYISiGhx3G9onvlXfK67Fr3lk_BrokhOjFkGRFi3Bw"/>
<!-- Scanning Overlay UI -->
<div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
<!-- Focus Brackets -->
<div class="relative w-64 h-64">
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary-container rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary-container rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary-container rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary-container rounded-br-xl"></div>
<!-- Scan Line -->
<div class="absolute top-0 left-0 right-0 h-1 bg-primary-container/60 shadow-[0_0_15px_rgba(255,215,0,0.8)] animate-scan"></div>
</div>
<p class="mt-8 font-label-caps text-label-caps text-primary-fixed px-4 py-1 bg-black/40 rounded-full backdrop-blur-md">Position Barcode in Center</p>
</div>
</div>
<!-- Active PO Indicator -->
<div class="absolute top-4 left-4 right-4 z-10">
<div class="bg-surface-container-lowest/90 backdrop-blur-md p-3 rounded-xl border border-white/20 shadow-lg flex items-center gap-3">
<div class="w-10 h-10 rounded-lg bg-secondary-container/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary">inventory_2</span>
</div>
<div class="flex-1">
<div class="flex justify-between items-center">
<span class="font-label-caps text-label-caps text-secondary uppercase">Active Purchase Order</span>
<span class="font-technical-data text-technical-data text-on-surface-variant">45% Received</span>
</div>
<p class="font-title-md text-on-surface">#PO-99281 <span class="text-on-surface-variant font-normal text-sm ml-1">Global Parts Co</span></p>
</div>
</div>
</div>
<!-- Feedback Slide-up Panel (Simulating Barcode Detected State) -->
<div class="absolute bottom-0 left-0 right-0 z-20 translate-y-0 transition-transform duration-500 ease-out" id="scan-result-panel">
<div class="glass-panel rounded-t-[32px] px-margin-mobile pt-3 pb-safe shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full mx-auto mb-6"></div>
<!-- Header Info -->
<div class="flex justify-between items-start mb-6">
<div class="space-y-1">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">iPhone 15 OLED Display</h2>
<div class="flex items-center gap-2">
<span class="font-technical-data text-technical-data bg-surface-container px-2 py-0.5 rounded text-on-tertiary-fixed-variant">DIS-AP-15-ORI</span>
<div class="flex items-center gap-1 bg-emerald-100 text-emerald-800 px-2 py-0.5 rounded text-xs font-semibold">
<span class="material-symbols-outlined text-xs">check_circle</span>
                MATCHED TO PO
              </div>
</div>
</div>
<div class="p-2 bg-primary-container rounded-full shadow-sm">
<span class="material-symbols-outlined text-on-primary-container">qr_code_2</span>
</div>
</div>
<!-- Verification Area -->
<div class="grid grid-cols-2 gap-4 mb-6">
<div class="p-4 rounded-2xl bg-surface-container-low border border-outline-variant/30">
<p class="font-label-caps text-label-caps text-on-surface-variant mb-1">EXPECTED</p>
<p class="font-display-lg text-headline-lg text-secondary">25</p>
</div>
<div class="p-4 rounded-2xl bg-primary-container/20 border-2 border-primary-container">
<p class="font-label-caps text-label-caps text-primary mb-1">SCANNED</p>
<div class="flex items-center justify-between">
<button class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-primary shadow-sm active:scale-90 transition-transform" onclick="decrement()">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-display-lg text-headline-lg text-on-surface" id="scanned-count">24</span>
<button class="w-8 h-8 rounded-full bg-white flex items-center justify-center text-primary shadow-sm active:scale-90 transition-transform" onclick="increment()">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</div>
<!-- Condition Control -->
<div class="mb-8">
<p class="font-label-caps text-label-caps text-on-surface-variant mb-3">CONDITION STATUS</p>
<div class="grid grid-cols-3 gap-2 bg-surface-container rounded-xl p-1">
<button class="condition-btn bg-white shadow-sm text-primary py-3 rounded-lg font-title-md text-sm transition-all flex flex-col items-center gap-1" onclick="setCondition(this)">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">verified</span>
              Excellent
            </button>
<button class="condition-btn text-on-surface-variant py-3 rounded-lg font-title-md text-sm transition-all flex flex-col items-center gap-1" onclick="setCondition(this)">
<span class="material-symbols-outlined">report_problem</span>
              Damaged
            </button>
<button class="condition-btn text-on-surface-variant py-3 rounded-lg font-title-md text-sm transition-all flex flex-col items-center gap-1" onclick="setCondition(this)">
<span class="material-symbols-outlined">question_mark</span>
              Wrong
            </button>
</div>
</div>
<!-- Primary Actions -->
<div class="space-y-3 pb-8">
<button class="w-full bg-primary-container text-on-primary-container py-4 rounded-2xl font-title-md text-lg shadow-lg active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
            Log &amp; Next Item
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
<button class="w-full bg-transparent text-on-surface-variant py-3 rounded-2xl font-title-md text-base hover:bg-surface-container transition-colors">
            Finish Shipment
          </button>
</div>
</div>
</div>
</main>
<script>
    function increment() {
      const countEl = document.getElementById('scanned-count');
      let count = parseInt(countEl.innerText);
      countEl.innerText = count + 1;
      
      // Flash effect on increment
      countEl.classList.add('text-primary');
      setTimeout(() => countEl.classList.remove('text-primary'), 200);
    }

    function decrement() {
      const countEl = document.getElementById('scanned-count');
      let count = parseInt(countEl.innerText);
      if (count > 0) countEl.innerText = count - 1;
    }

    function setCondition(btn) {
      document.querySelectorAll('.condition-btn').forEach(b => {
        b.classList.remove('bg-white', 'shadow-sm', 'text-primary');
        b.classList.add('text-on-surface-variant');
        const icon = b.querySelector('.material-symbols-outlined');
        icon.style.fontVariationSettings = "'FILL' 0";
      });
      btn.classList.add('bg-white', 'shadow-sm', 'text-primary');
      btn.classList.remove('text-on-surface-variant');
      btn.querySelector('.material-symbols-outlined').style.fontVariationSettings = "'FILL' 1";
    }

    // Flashlight Toggle Interaction
    const flashBtn = document.getElementById('flashlight-toggle');
    let isFlashOn = false;
    flashBtn.addEventListener('click', () => {
      isFlashOn = !isFlashOn;
      const icon = flashBtn.querySelector('span');
      if (isFlashOn) {
        icon.innerText = 'flashlight_off';
        flashBtn.classList.add('bg-primary-container');
        // Simple haptic-like scale effect
        flashBtn.style.transform = 'scale(1.2)';
        setTimeout(() => flashBtn.style.transform = 'scale(1)', 100);
      } else {
        icon.innerText = 'flashlight_on';
        flashBtn.classList.remove('bg-primary-container');
      }
    });

    // Simple interaction to simulate panel movement
    let panelOpen = true;
    const panel = document.getElementById('scan-result-panel');
    const handle = panel.querySelector('.w-12');
    
    handle.addEventListener('click', () => {
      panelOpen = !panelOpen;
      panel.style.transform = panelOpen ? 'translateY(0)' : 'translateY(calc(100% - 100px))';
    });
  </script>
</body></html>
